<div
  class="pointer-events-none fixed inset-x-0 bottom-4 z-[100] flex flex-col items-center gap-2 px-4"
  aria-live="polite">
  @for (toast of toasts(); track toast.id) {
    <div
      class="pointer-events-auto flex w-full max-w-md items-center gap-3 rounded-xl border px-4 py-3 shadow-2xl backdrop-blur-md"
      [class]="toast.type === 'error'
        ? 'border-rose-500/40 bg-rose-950/90 text-rose-100'
        : toast.type === 'success'
          ? 'border-emerald-500/40 bg-emerald-950/90 text-emerald-100'
          : 'border-slate-600 bg-slate-800/95 text-zinc-100'">

      <p class="min-w-0 flex-1 break-words text-sm">{{ toast.message }}</p>

      @if (toast.actionLabel) {
        <button
          type="button"
          class="flex-none rounded-full border border-current px-3 py-1 text-xs font-semibold
                 transition hover:bg-white/10"
          (click)="toastService.runAction(toast)">
          {{ toast.actionLabel }}
        </button>
      }

      <button
        type="button"
        class="flex-none text-current/60 transition hover:text-current"
        (click)="toastService.dismiss(toast.id)"
        aria-label="Hinweis schließen">
        ✕
      </button>
    </div>
  }
</div>
