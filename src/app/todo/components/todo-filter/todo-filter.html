  <section class="flex gap-2 mt-6 mb-4 rounded-xl bg-bg3 p-1 ">
    <button class="flex-1 btn " [class.btn-primary]="filter() === 'all'"
    (click)="filter.set('all')">All </button>
    <button class="flex-1 btn " [class.btn-primary]="filter() === 'active'" 
    (click)="filter.set('active')">Active  </button>
    <button class="flex-1 btn " [class.btn-primary]="filter() === 'completed'"
    (click)="filter.set('completed')">Done</button>
  </section>
