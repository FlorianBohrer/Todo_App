  <div class="mt-6 mb-3">
  <div class="flex h-11 w-full items-center gap-3 rounded-full bg-bg3 px-4
              ring-1 ring-white/10 transition focus-within:ring-2 focus-within:ring-indigo-500">
    <lucide-icon [img]="SearchIcon" class="h-4 w-4 flex-none text-muted" aria-hidden="true"></lucide-icon>
    <input #todoSearch type="text" placeholder="Search todos…"
      class="min-w-0 flex-1 bg-transparent text-text outline-none placeholder:text-muted"
      [value]="searchTerm()"
      (input)="searchTerm.set(todoSearch.value)"
      (keydown.escape)="clearSearch(); todoSearch.value = ''"
      aria-label="Search todos" />
    @if (searchTerm()) {
      <button type="button"
        class="grid h-7 w-7 flex-none place-items-center rounded-md text-muted transition hover:bg-white/5 hover:text-text"
        (click)="clearSearch(); todoSearch.value = ''" aria-label="Clear search">✕</button>
    }
  </div>
</div>
  
  <section class="flex gap-2 mt-6 mb-4 rounded-full bg-bg3 p-1 ">
    
    <button class="flex-1 btn rounded-full" [class.btn-primary]="filter() === 'active'" 
    (click)="filter.set('active')">Active  </button>
    <button class="flex-1 btn rounded-full" [class.btn-primary]="filter() === 'completed'"
    (click)="filter.set('completed')">Done</button>
    <button class="flex-1 btn rounded-full" [class.btn-primary]="filter() === 'favorites'"
    (click)="filter.set('favorites')">Favorites</button>
    <button class="flex-1 btn rounded-full" [class.btn-primary]="filter() === 'all'"
    (click)="filter.set('all')">All </button>
  </section>
