@if (favorites().length > 0) {
  <section class="mx-auto mb-4 w-full max-w-3xl" aria-label="Favorite folders">
    <div class="grid grid-cols-2 gap-3 sm:grid-cols-3">
      @for (label of favorites(); track label.id) {
        <button
          type="button"
          class="group flex flex-col gap-3 rounded-2xl border border-white/5 p-4 text-left shadow-lg
                 backdrop-blur-md transition duration-200 hover:-translate-y-0.5 hover:shadow-xl"
          [class]="bgClass(label.color)"
          [class.ring-2]="activeLabelId() === label.id"
          [class.ring-emerald-500]="activeLabelId() === label.id"
          [attr.aria-pressed]="activeLabelId() === label.id"
          (click)="select(label.id)">

          <div class="flex w-full items-center gap-2.5">
            <span
              class="flex h-8 w-8 flex-none items-center justify-center rounded-lg"
              [class]="iconBoxClass(label.color)">
              <lucide-icon
                [img]="iconFor(label.icon)"
                class="h-4 w-4"
                [class]="textClass(label.color)">
              </lucide-icon>
            </span>
            <span [class]="'min-w-0 flex-1 truncate font-semibold ' + textClass(label.color)">
              {{ label.name }}
            </span>
            <span class="flex-none text-amber-400" aria-hidden="true">★</span>
          </div>

          <div class="w-full">
            <div class="mb-1 flex items-center justify-between text-xs">
              <span [class]="'opacity-80 ' + textClass(label.color)">
                {{ progress(label.id).completed }} of {{ progress(label.id).total }} done
              </span>
              <span [class]="'font-medium ' + textClass(label.color)">
                {{ progress(label.id).percent }}%
              </span>
            </div>
            <div class="h-1.5 w-full overflow-hidden rounded-full bg-slate-700/50">
              <div
                class="h-full rounded-full transition-all duration-300"
                [class]="barClass(label.color)"
                [style.width.%]="progress(label.id).percent">
              </div>
            </div>
          </div>
        </button>
      }
    </div>
  </section>
}
