  <section class="mt-4  p-4 ">
    <div class="flex gap-2">
      <input class="flex-1 rounded-lg  px-3 py-2 ring-1 ring-zinc-800 text-2xl border border-zinc-500 focus:ring-indigo-500"
      placeholder="Whats needs to be done?"
      [(ngModel)] = "newTitle"
      (keyup.enter)="addTodo(newTitle)"
      aria-label="New todo"
      />
      <button class="rounded-lg px-5 py-2 border bg-zinc-700 border-zinc-800 font-medium text-2xl hover:bg-zinc-700 disabled:opacity-50"
      (click)="addTodo(newTitle)"
      >
      Add
    </button>
    
    </div>
  </section>
