<section class="mt-4 p-4 sm:p-0">
 <div class="flex items-end gap-3">
  <textarea
    appAutosize
    rows="1"
    class="min-h-11 flex-1 resize-none overflow-hidden rounded-xl bg-bg2 px-4 py-3 text-text"
    placeholder="Add a todo..."
    [(ngModel)]="newTitle"
    (keydown.enter)="$event.preventDefault(); addTodo()"
    aria-label="New todo"
  ></textarea>

  <button
    type="button"
    class="btn btn-primary h-11 flex-none self-end px-5"
    (click)="addTodo()"
  >
    Add
  </button>
</div>
</section>
