@if (clerk.user$ | async; as user) {
  <div class="flex items-center justify-end gap-3 p-4">
    <app-user-account />
    <button
      class="text-xs text-danger transition hover:opacity-80"
      (click)="signOut()">
      Logout
    </button>
  </div>

  <div class="text-violet-400 text-emerald-400 text-rose-400 text-orange-400 bg-violet-950 bg-emerald-950 bg-rose-950 bg-orange-950"></div>

  <main class="min-h-screen pt-15 w-full transition-colors duration-500 bg-bg2">
    <div class="sticky top-4 z-10 mb-10 mx-auto w-full max-w-3xl backdrop-blur-md">
      <app-header [title]="title()" [accentClass]="accentClass()"></app-header>

      <div
        class="mt-1 h-1.5 w-16 rounded-full transition-colors duration-300 sm:h-2 sm:w-24"
        [class]="accentClass()">
      </div>

      <button
        class="inline-flex mb-6 items-center gap-2 rounded-full border px-6 py-2 text-base text-slate-200 transition hover:bg-text hover:text-slate-700"
        (click)="openCategories()"
        aria-label="Open categories">
        <lucide-icon [img]="FolderDownIcon" class="h-4 w-4"></lucide-icon>
        <span>Folders</span>
        <lucide-icon [img]="ArrowDown" class="h-4 w-4"></lucide-icon>
      </button>
    </div>

    <section class="mx-auto max-w-3xl rounded-2xl bg-panel2 backdrop-blur-md border border-white/10 shadow-2xl p-6">
      <app-todo-stats></app-todo-stats>
      <app-todo-add></app-todo-add>
      <app-todo-filter></app-todo-filter>
      <app-todo-list></app-todo-list>
    </section>

    <app-categories-overlay></app-categories-overlay>
  </main>
} @else {
  <div class="min-h-screen flex items-center justify-center bg-bg2">
    <button
      class="rounded-full border px-6 py-3 text-slate-200 hover:bg-text hover:text-slate-700"
      (click)="signIn()">
      Anmelden
    </button>
  </div>
}
